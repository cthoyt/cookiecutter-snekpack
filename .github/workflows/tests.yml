# This file configures the continuous integration (CI) system on GitHub.
# Introductory materials can be found here: https://docs.github.com/en/actions/learn-github-actions/understanding-github-actions.
# Documentation for editing this file can be found here: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

name: Tests

# by default, give the GITHUB_TOKEN no permissions
# See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Linting
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: "astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57" # v8.0.0

      - name: Install Dependencies
        run: |
          uv tool install rust-just

      - name: lint justfile
        run: just --fmt --check --unstable

      - name: lint YAML
        run: npx --yes prettier --check --prose-wrap always --write "**/*.yml"

      - name: lint JSON
        run: npx --yes prettier --check --prose-wrap always --write "**/*.json"

      - name: lint markdown
        run: npx --yes prettier --check --prose-wrap always --write "**/*.md"

  tests-tox:
    name: Tests w/ Tox
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14", "3.10"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: "astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57" # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          uv tool install cookiecutter
          uv tool install zizmor
          uv tool install --with tox-uv tox

      - name: Cut the Cookie
        run: |
          cookiecutter --no-input . package_name=test_octopus "package_name_stylized=Test Octopus" "short_description=Test Octopus Package Description" "author_name=Charles Tapley Hoyt" "author_email=cthoyt@gmail.com" author_github=cthoyt github_organization_name=cthoyt github_repository_name=test-octopus runner=tox

      - name: Commit
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add --all
          git commit -m "Add cookiecutter to local git, but don't push"

      - name: Run tests
        run: cd test_octopus && tox

      - name: Test zizmor
        run: zizmor .

      - name: Test build
        run: cd test_octopus && tox -e build

      - name: Test bumping version
        run: |
          cd test_octopus
          tox -e bumpversion -- minor
          tox -e build

  tests-just:
    name: Tests w/ Just
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14", "3.10"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: "astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57" # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          uv tool install cookiecutter
          uv tool install zizmor
          uv tool install rust-just

      - name: Cut the Cookie
        run: |
          cookiecutter --no-input . package_name=test_octopus "package_name_stylized=Test Octopus" "short_description=Test Octopus Package Description" "author_name=Charles Tapley Hoyt" "author_email=cthoyt@gmail.com" author_github=cthoyt github_organization_name=cthoyt github_repository_name=test-octopus runner=just

      - name: Commit
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add --all
          git commit -m "Add cookiecutter to local git, but don't push"

      - name: Run tests
        run: cd test_octopus && just test

      - name: Test zizmor
        run: zizmor .

      - name: Test build
        run: cd test_octopus && just build

      - name: Test bumping version
        run: |
          cd test_octopus
          just bumpversion minor
          just build
